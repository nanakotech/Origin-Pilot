        echo "开始构建wheel包..."
        python setup.py bdist_wheel
        
        if [ ! -d "dist" ] || [ -z "$(ls -A dist/*.whl 2>/dev/null)" ]; then
          echo "⚠️ 尝试使用build工具构建..."
